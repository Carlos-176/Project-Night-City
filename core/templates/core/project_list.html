{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Projects</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>

<body>

    <nav class="navbar navbar-expand-lg cyber-nav">
        <div class="container">
            <a class="navbar-brand cyber-brand" href="{% url 'home' %}">Project Night City</a>

            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'home' %}">Introduction</a>
                <a class="nav-link" href="{% url 'skills' %}">Skills</a>
                <a class="nav-link" href="{% url 'project_list' %}">Projects</a>
                <a class="nav-link" href="{% url 'personal_information' %}">Personal Info</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Projects</h1>
        <p>Here are the projects stored in my database.</p>

        {% for project in projects %}
            <div class="card mb-3">
                <div class="card-body">
                    <a href="{% url 'project_detail' project.id %}">
                        {{ project.project_name }}
                    </a>
                </div>
            </div>
        {% endfor %}
    </div>

</body>
</html>
